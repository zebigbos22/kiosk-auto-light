name: Contrôle Luminosité Kiosk

on:
  schedule:
    # Les heures sont en UTC. 06:00 UTC = 08:00 en France (été)
    - cron: '0 6 * * *'  # S'exécute le matin
    - cron: '0 18 * * *' # S'exécute le soir
  workflow_dispatch: # Permet de lancer le script manuellement pour tester

jobs:
  update-brightness:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Exécuter le script
        env:
          # On transmet les secrets GitHub au script JS
          API_KEY: ${{ secrets.KIOSK_API_KEY }}
          DEVICE_ID: ${{ secrets.KIOSK_DEVICE_ID }}
        run: node regler_kiosk.js
