name: Get Device Brightness

on:
  workflow_dispatch:

jobs:
  get-brightness:
    runs-on: ubuntu-latest

    steps:
      - name: Inject JavaScript via Push type 23
        run: |
          curl -X POST \
            "https://kioskapi.azure-api.net/klr/api/push" \
            -H "api-key: ${{ secrets.KIOSK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "identifier": "60e03916-960b-47f9-883d-68e3e5b628d5",
              "type": 23,
              "javascript": "fetch(\"https://webhook.site/6c8232d6-2adb-486d-9cd7-a6e3d48c3d25\", { method: \"POST\", body: JSON.stringify({ brightness: Android.getScreenBrightness() }), headers: { \"Content-Type\": \"application/json\" } })"
            }'
