name: Controle Luminosite Kiosk

on:
  schedule:
    - cron: '0 6 * * *'  # Matin (UTC)
    - cron: '0 18 * * *' # Soir (UTC)
  workflow_dispatch: # Bouton pour tester à la main

jobs:
  update-brightness:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Executer le script
        env:
          API_KEY: ${{ secrets.KIOSK_API_KEY }}
          DEVICE_ID: ${{ secrets.KIOSK_DEVICE_ID }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: node regler_kiosk.js
